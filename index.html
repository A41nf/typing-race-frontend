<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سباق الكتابة — مدرسة شمس المعارف</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet" />

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Socket.io Client -->
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { cairo: ['Cairo', 'Tajawal', 'sans-serif'] },
          colors: {
            brand:   { 400:'#59adff', 500:'#338bff', 600:'#1a6af5', 700:'#1454e1' },
            gold:    { 400:'#facc15', 500:'#eab308' },
            emerald: { 400:'#34d399', 500:'#10b981', 600:'#059669' },
            rose:    { 400:'#fb7185', 500:'#f43f5e', 600:'#e11d48' },
          },
          animation: {
            'bounce-in': 'bounceIn 0.6s cubic-bezier(0.34,1.56,0.64,1)',
            'slide-up':  'slideUp 0.5s ease-out',
            'fade-in':   'fadeIn 0.4s ease-out',
            'count-pop': 'countPop 0.5s cubic-bezier(0.34,1.56,0.64,1)',
            'glow':      'glow 2s ease-in-out infinite alternate',
          },
          keyframes: {
            bounceIn:  { '0%':{transform:'scale(0.3)',opacity:'0'}, '60%':{transform:'scale(1.05)'}, '100%':{transform:'scale(1)',opacity:'1'} },
            slideUp:   { '0%':{transform:'translateY(30px)',opacity:'0'}, '100%':{transform:'translateY(0)',opacity:'1'} },
            fadeIn:    { '0%':{opacity:'0'}, '100%':{opacity:'1'} },
            countPop:  { '0%':{transform:'scale(0.5)',opacity:'0'}, '60%':{transform:'scale(1.2)'}, '100%':{transform:'scale(1)',opacity:'1'} },
            glow:      { '0%':{boxShadow:'0 0 20px rgba(51,139,255,0.3)'}, '100%':{boxShadow:'0 0 40px rgba(51,139,255,0.6)'} },
          },
        },
      },
    }
  </script>

  <style>
    * { font-family: 'Cairo', 'Tajawal', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

    .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); }
    .glass-strong { background: rgba(255,255,255,0.06); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1); }

    .char-correct { color: #34d399; }
    .char-wrong   { color: #fb7185; background: rgba(251,113,133,0.15); border-radius: 2px; }
    .char-current { color: #facc15; border-bottom: 3px solid #facc15; animation: pulse 1s ease-in-out infinite; }
    .char-pending { color: rgba(255,255,255,0.35); }

    .count-number { font-size: 8rem; font-weight: 900; background: linear-gradient(135deg, #338bff, #8ecaff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 30px rgba(51,139,255,0.4)); }
    .race-input { caret-color: #facc15; }
    .race-input:focus { outline: none; }
    .progress-glow { box-shadow: 0 0 12px rgba(51,139,255,0.5), 0 0 4px rgba(51,139,255,0.3); }
    .medal-gold { filter: drop-shadow(0 0 8px rgba(250,204,21,0.6)); }
    .medal-silver { filter: drop-shadow(0 0 8px rgba(148,163,184,0.6)); }
    .medal-bronze { filter: drop-shadow(0 0 8px rgba(217,119,6,0.6)); }
    .screen-enter { animation: slideUp 0.5s ease-out, fadeIn 0.4s ease-out; }
  </style>
</head>
<body class="bg-[#0a0e1a] text-white min-h-screen overflow-x-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ═══════════════════════════════════════════════════════
    //  CONFIG
    // ═══════════════════════════════════════════════════════

    const urlParams = new URLSearchParams(window.location.search);
    const savedApiOrigin = localStorage.getItem("typingRaceApiOrigin");
    const configuredApiOrigin = urlParams.get("api") || savedApiOrigin;
    const DEFAULT_PRODUCTION_API_ORIGIN = "https://typing-race-backend-buvz.onrender.com";
    const API_ORIGIN = configuredApiOrigin || (window.location.hostname === "localhost"
      ? "http://localhost:3001"
      : DEFAULT_PRODUCTION_API_ORIGIN);
    if (urlParams.get("api")) localStorage.setItem("typingRaceApiOrigin", urlParams.get("api"));
    const SOCKET_URL = `${API_ORIGIN}/race`;
    const API        = `${API_ORIGIN}/api`;

    const SCREEN = {
      LANDING: "landing",
      ADMIN_LOGIN: "admin_login",
      ADMIN_PANEL: "admin_panel",
      PLAYER_LOGIN: "player_login",
      LOBBY: "lobby",
      COUNTDOWN: "countdown",
      RACE: "race",
      RESULTS: "results"
    };

    const SESSION_KEY = "trs_session";
    function saveSession(data) {
      try { const s = JSON.stringify(data); sessionStorage.setItem(SESSION_KEY, s); localStorage.setItem(SESSION_KEY, s); } catch(e) {}
    }
    function loadSession() {
      try { const raw = sessionStorage.getItem(SESSION_KEY) || localStorage.getItem(SESSION_KEY); return raw ? JSON.parse(raw) : null; } catch(e) { return null; }
    }
    function clearSession() {
      try { sessionStorage.removeItem(SESSION_KEY); localStorage.removeItem(SESSION_KEY); } catch(e) {}
    }

    // ═══════════════════════════════════════════════════════
    //  API CLIENT
    // ═══════════════════════════════════════════════════════

    async function apiLogin(id, pin) {
      const res = await fetch(`${API}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, pin }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || "خطأ في تسجيل الدخول");
      return data;
    }

    async function adminLogin(password) {
      const res = await fetch(`${API}/auth/admin-login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || "خطأ في تسجيل دخول المشرف");
      return data;
    }

    async function submitResult(resultData, headers) {
      const res = await fetch(`${API}/results`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Player-Id": headers.playerId, "X-Player-Pin": headers.playerPin },
        body: JSON.stringify(resultData),
      });
      return res.json();
    }

    async function getPlayers() {
      const res = await fetch(`${API}/players`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || "تعذر تحميل اللاعبين");
      return data.players || [];
    }

    async function updatePlayer(playerId, payload, adminToken) {
      const res = await fetch(`${API}/players/${encodeURIComponent(playerId)}`, {
        method: "PATCH",
        headers: {
          "Content-Type": "application/json",
          "X-Admin-Token": adminToken,
        },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || "فشل حفظ بيانات اللاعب");
      return data.player;
    }

    async function createPlayer(payload, adminToken) {
      const res = await fetch(`${API}/players`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-Admin-Token": adminToken,
        },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || "فشل إنشاء اللاعب");
      return data.player;
    }

    // ═══════════════════════════════════════════════════════
    //  UI COMPONENTS
    // ═══════════════════════════════════════════════════════

    function BGDecor() {
      return (
        <div className="fixed inset-0 pointer-events-none overflow-hidden z-0">
          <div className="absolute -top-40 -right-40 w-96 h-96 bg-brand-600/10 rounded-full blur-3xl"></div>
          <div className="absolute -bottom-40 -left-40 w-96 h-96 bg-emerald-500/8 rounded-full blur-3xl"></div>
          <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-violet-500/5 rounded-full blur-3xl"></div>
        </div>
      );
    }

    function SchoolHeader({ subtitle }) {
      return (
        <div className="text-center mb-8 animate-fade-in">
          <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-brand-500/20 to-brand-700/20 border border-brand-500/20 mb-4">
            <span className="text-3xl">🏫</span>
          </div>
          <h1 className="text-2xl md:text-3xl font-bold bg-gradient-to-r from-white via-white to-white/70 bg-clip-text text-transparent leading-relaxed">مدرسة شمس المعارف للتعليم الأساسي</h1>
          <p className="text-white/40 text-sm mt-1 font-light">(1 - 4)</p>
          {subtitle && <p className="text-brand-400 text-sm mt-2 font-medium">{subtitle}</p>}
        </div>
      );
    }

    const COLOR_MAP = {
      brand: "from-brand-500/15 to-brand-600/5 border-brand-500/20 text-brand-400",
      emerald: "from-emerald-500/15 to-emerald-600/5 border-emerald-500/20 text-emerald-400",
      gold: "from-gold-500/15 to-gold-600/5 border-gold-500/20 text-gold-400",
      rose: "from-rose-500/15 to-rose-600/5 border-rose-500/20 text-rose-400",
    };

    function StatCard({ icon, label, value, color = "brand" }) {
      return (
        <div className={`bg-gradient-to-br ${COLOR_MAP[color]} border rounded-2xl p-4`}>
          <div className="flex items-center gap-2 mb-1">
            <span className="w-4 h-4 opacity-70">{icon}</span>
            <span className="text-xs text-white/50 font-medium">{label}</span>
          </div>
          <p className="text-2xl font-bold text-white">{value}</p>
        </div>
      );
    }

    function ProgressBar({ value, max, label }) {
      const pct = Math.min((value / max) * 100, 100);
      return (
        <div className="glass rounded-xl p-3">
          <div className="flex justify-between text-xs text-white/40 mb-2">
            <span>{label || "التقدم"}</span>
            <span>{Math.round(pct)}%</span>
          </div>
          <div className="h-3 bg-white/5 rounded-full overflow-hidden">
            <div className="h-full bg-gradient-to-l from-brand-500 to-brand-400 rounded-full transition-all duration-300 progress-glow" style={{ width: `${pct}%` }}></div>
          </div>
        </div>
      );
    }

    function formatTime(secs) { const m = Math.floor(secs / 60); const s = Math.floor(secs % 60); return `${m}:${String(s).padStart(2, "0")}`; }

    // ═══════════════════════════════════════════════════════
    //  SCREEN 1 — LANDING / LOGINS / ADMIN PANEL
    // ═══════════════════════════════════════════════════════

    function EntryCard({ title, description, icon, onClick, accent = "brand" }) {
      const accents = {
        brand: "border-brand-500/20",
        emerald: "border-emerald-500/20"
      };

      return (
        <button onClick={onClick} className={`glass-strong w-full rounded-3xl border p-6 text-right transition-all duration-200 hover:-translate-y-1 hover:bg-white/10 ${accents[accent]}`}>
          <div className="mb-5 flex items-center justify-between gap-4">
            <div className="text-4xl">{icon}</div>
            <div className="rounded-2xl bg-white/10 px-3 py-1 text-xs font-bold text-white/70">دخول</div>
          </div>
          <h2 className="mb-2 text-2xl font-bold text-white">{title}</h2>
          <p className="text-sm leading-7 text-white/55">{description}</p>
        </button>
      );
    }

    function DashboardScreen({ onSelectMode }) {
      return (
        <div className="min-h-screen flex items-center justify-center p-4 screen-enter">
          <div className="w-full max-w-5xl">
            <SchoolHeader subtitle="إعداد: أ. نصره الراشدية" />
            <div className="grid gap-5 md:grid-cols-2">
              <EntryCard title="دخول المشرف" description="إعداد اللاعبين، متابعة المتصلين مباشرة، وبدء السباق عند الجاهزية." icon="🛡️" onClick={() => onSelectMode("admin")} />
              <EntryCard title="دخول اللاعب" description="تسجيل الدخول برقم اللاعب والرمز السري ثم انتظار المشرف لبدء السباق." icon="⌨️" accent="emerald" onClick={() => onSelectMode("player")} />
            </div>
          </div>
        </div>
      );
    }

    function AdminLoginScreen({ onSuccess, onBack }) {
      const [password, setPassword] = useState("");
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");

      const handleSubmit = async () => {
        setError("");
        setLoading(true);
        try {
          const data = await adminLogin(password);
          onSuccess(data.token);
        } catch (err) {
          setError(err.message || "تعذر تسجيل دخول المشرف");
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4 screen-enter">
          <div className="w-full max-w-md">
            <SchoolHeader subtitle="دخول المشرف" />
            <div className="glass-strong rounded-3xl p-8 animate-bounce-in">
              <label className="block text-sm text-white/60 mb-2 font-medium">كلمة المرور</label>
              <input type="password" value={password} onChange={e => { setPassword(e.target.value); setError(""); }} onKeyDown={e => e.key === "Enter" && handleSubmit()} placeholder="أدخل كلمة مرور المشرف" className="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-white placeholder:text-white/25 focus:border-brand-500/50" />
              {error && <div className="mt-4 p-3 rounded-xl bg-rose-500/10 border border-rose-500/20 text-rose-300 text-sm">{error}</div>}
              <div className="mt-6 flex gap-3">
                <button onClick={handleSubmit} disabled={!password || loading} className="flex-1 py-3 rounded-xl bg-gradient-to-l from-brand-500 to-brand-600 text-white font-bold disabled:opacity-50">{loading ? "جاري التحقق..." : "دخول"}</button>
                <button onClick={onBack} className="px-5 py-3 rounded-xl bg-white/8 border border-white/10 text-white/80">رجوع</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function PlayerLoginScreen({ onLogin, onBack }) {
      const [playerId, setPlayerId] = useState("");
      const [pin, setPin] = useState("");
      const [guestName, setGuestName] = useState("");
      const [error, setError] = useState("");
      const [loginLoading, setLoginLoading] = useState(false);
      const [guestLoading, setGuestLoading] = useState(false);

      const handleLogin = async () => {
        setError("");
        setLoginLoading(true);
        try {
          const data = await apiLogin(playerId.trim(), pin);
          onLogin(data.player, data.headers);
        } catch (err) {
          setError(err.message || "خطأ في الاتصال بالخادم");
        } finally {
          setLoginLoading(false);
        }
      };

      const handleGuestLogin = () => {
        const name = guestName.trim();
        if (!name) return;
        setError("");
        setGuestLoading(true);
        try {
          const guestId = `G${Date.now().toString(36).toUpperCase()}${Math.random().toString(36).slice(2, 6).toUpperCase()}`;
          onLogin({
            playerId: guestId,
            name,
            school: "ضيف",
            avatar: "🧑‍🎓",
            isGuest: true,
          });
        } finally {
          setGuestLoading(false);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4 screen-enter">
          <div className="w-full max-w-5xl">
            <SchoolHeader subtitle="دخول اللاعب" />
            <div className="grid gap-5 md:grid-cols-2">
              <div className="glass-strong rounded-3xl p-8 animate-bounce-in">
                <div className="mb-6">
                  <div className="inline-flex items-center rounded-2xl border border-brand-500/20 bg-brand-500/10 px-3 py-1 text-xs font-bold text-brand-200">الخيار A</div>
                  <h2 className="mt-3 text-xl font-bold text-white">تسجيل الدخول بالاسم والرقم السري</h2>
                  <p className="mt-2 text-sm leading-7 text-white/45">الدخول المعتاد للاعبين المسجلين مسبقاً مع التحقق الكامل من بياناتهم قبل الانضمام.</p>
                </div>
                <div className="mb-4">
                  <label className="block text-sm text-white/60 mb-2 font-medium">رقم اللاعب</label>
                  <input type="text" value={playerId} onChange={e => { setPlayerId(e.target.value.toUpperCase()); setError(""); }} onKeyDown={e => e.key === "Enter" && handleLogin()} placeholder="مثال: P001" className="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-white placeholder:text-white/25 focus:border-brand-500/50" dir="ltr" />
                </div>
                <div className="mb-6">
                  <label className="block text-sm text-white/60 mb-2 font-medium">الرمز السري</label>
                  <input type="password" value={pin} onChange={e => { setPin(e.target.value); setError(""); }} onKeyDown={e => e.key === "Enter" && handleLogin()} placeholder="****" maxLength={4} className="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-white placeholder:text-white/25 focus:border-brand-500/50 text-lg tracking-widest" dir="ltr" />
                </div>
                <button onClick={handleLogin} disabled={!playerId || !pin || loginLoading || guestLoading} className="w-full py-3.5 rounded-xl bg-gradient-to-l from-brand-500 to-brand-600 disabled:opacity-50 text-white font-bold transition-all duration-200">
                  {loginLoading ? <div className="w-5 h-5 mx-auto border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : "دخول"}
                </button>
              </div>

              <div className="glass-strong rounded-3xl p-8 animate-bounce-in">
                <div className="mb-6">
                  <div className="inline-flex items-center rounded-2xl border border-emerald-500/20 bg-emerald-500/10 px-3 py-1 text-xs font-bold text-emerald-200">الخيار B</div>
                  <h2 className="mt-3 text-xl font-bold text-white">الدخول بالاسم فقط</h2>
                  <p className="mt-2 text-sm leading-7 text-white/45">دخول سريع كضيف دون رقم سري أو تحقق من Firestore، ثم الانضمام مباشرة إلى نفس القاعة.</p>
                </div>
                <div className="mb-6">
                  <label className="block text-sm text-white/60 mb-2 font-medium">اسم اللاعب</label>
                  <input type="text" value={guestName} onChange={e => { setGuestName(e.target.value); setError(""); }} onKeyDown={e => e.key === "Enter" && handleGuestLogin()} placeholder="اكتب اسمك بالعربية أو الإنجليزية" className="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-white placeholder:text-white/25 focus:border-brand-500/50" dir="auto" />
                </div>
                <button onClick={handleGuestLogin} disabled={!guestName.trim() || guestLoading || loginLoading} className="w-full py-3.5 rounded-xl bg-gradient-to-l from-emerald-500 to-emerald-600 disabled:opacity-50 text-white font-bold transition-all duration-200">
                  {guestLoading ? <div className="w-5 h-5 mx-auto border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : "دخول كضيف"}
                </button>
              </div>
            </div>
            {error && <div className="mt-4 mx-auto max-w-2xl p-3 rounded-xl bg-rose-500/10 border border-rose-500/20 text-rose-400 text-sm text-center animate-fade-in">{error}</div>}
            <div className="mt-4 flex justify-center">
              <button onClick={onBack} className="px-5 py-3 rounded-xl bg-white/8 border border-white/10 text-white/80">رجوع</button>
            </div>
          </div>
        </div>
      );
    }

    function AdminPanelScreen({ adminToken, players, liveProgress, raceActive, standings, raceText, onSavePlayers, onStartRace, onNewRace, onBack }) {
      const [playerCount, setPlayerCount] = useState(2);
      const [rows, setRows] = useState([
        { id: "P001", name: "", pin: "", school: "شمس المعارف", avatar: "🧑‍🎓" },
        { id: "P002", name: "", pin: "", school: "شمس المعارف", avatar: "🧑‍🎓" }
      ]);
      const [saving, setSaving] = useState(false);
      const [message, setMessage] = useState("");
      const [error, setError] = useState("");

      function buildRows(count, currentRows = rows) {
        return Array.from({ length: count }, (_, index) => {
          const fallbackId = `P${String(index + 1).padStart(3, "0")}`;
          const found = currentRows[index] || {};
          return {
            id: found.id || fallbackId,
            name: found.name || "",
            pin: found.pin || "",
            school: found.school || "شمس المعارف",
            avatar: found.avatar || "🧑‍🎓"
          };
        });
      }

      const updateRow = (index, field, value) => {
        setRows(prev => prev.map((row, rowIndex) => rowIndex === index ? { ...row, [field]: value } : row));
      };

      const handleCountChange = (value) => {
        const safeCount = Math.max(2, Math.min(20, Number(value) || 2));
        setPlayerCount(safeCount);
        setRows(prev => buildRows(safeCount, prev));
      };

      const handleSave = async () => {
        setSaving(true);
        setMessage("");
        setError("");
        try {
          await onSavePlayers(rows);
          setMessage("تم حفظ إعدادات اللاعبين بنجاح");
        } catch (err) {
          setError(err.message || "فشل حفظ إعدادات اللاعبين");
        } finally {
          setSaving(false);
        }
      };

      const readyCount = players.filter(player => player.ready).length;

      return (
        <div className="min-h-screen p-4 screen-enter">
          <div className="max-w-6xl mx-auto">
            <SchoolHeader subtitle="لوحة تحكم المشرف" />
            <div className="mb-4">
              <button onClick={onBack} className="px-4 py-2 rounded-xl bg-white/8 border border-white/10 text-white/80">رجوع</button>
            </div>
            <div className="grid gap-5 lg:grid-cols-[1.3fr_1fr]">
              <section className="glass-strong rounded-3xl p-6">
                <div className="flex items-center justify-between gap-4 mb-5">
                  <div>
                    <h2 className="text-xl font-bold text-white">إعداد اللاعبين</h2>
                    <p className="text-sm text-white/45 mt-1">حدد العدد ثم أدخل الاسم والرمز السري لكل لاعب.</p>
                  </div>
                  <input type="number" min="2" max="20" value={playerCount} onChange={e => handleCountChange(e.target.value)} className="w-24 rounded-xl border border-white/10 bg-white/5 px-3 py-3 text-center text-white" />
                </div>
                <div className="space-y-3">
                  {rows.map((row, index) => (
                    <div key={row.id || index} className="grid gap-3 rounded-2xl border border-white/10 bg-white/5 p-4 md:grid-cols-[120px_1fr_120px]">
                      <input value={row.id} onChange={e => updateRow(index, "id", e.target.value.toUpperCase())} className="rounded-xl bg-white/10 px-3 py-3 text-white" dir="ltr" placeholder="P001" />
                      <input value={row.name} onChange={e => updateRow(index, "name", e.target.value)} className="rounded-xl bg-white/10 px-3 py-3 text-white" placeholder="اسم اللاعب" />
                      <input value={row.pin} onChange={e => updateRow(index, "pin", e.target.value)} className="rounded-xl bg-white/10 px-3 py-3 text-white tracking-[0.3em]" placeholder="1234" dir="ltr" maxLength={4} />
                    </div>
                  ))}
                </div>
                {message && <div className="mt-4 p-3 rounded-xl bg-emerald-500/10 border border-emerald-500/20 text-emerald-300 text-sm">{message}</div>}
                {error && <div className="mt-4 p-3 rounded-xl bg-rose-500/10 border border-rose-500/20 text-rose-300 text-sm">{error}</div>}
                <div className="mt-3 text-xs text-white/30">رمز المشرف متصل حالياً عبر الجلسة.</div>
                <button onClick={handleSave} disabled={saving || !adminToken} className="mt-5 w-full py-3.5 rounded-xl bg-gradient-to-l from-brand-500 to-brand-600 text-white font-bold disabled:opacity-50">{saving ? "جاري الحفظ..." : "حفظ اللاعبين"}</button>
              </section>
              <div className="space-y-5">
                <section className="glass-strong rounded-3xl p-6">
                  <h2 className="text-xl font-bold text-white">اللاعبون المتصلون</h2>
                  <p className="text-sm text-white/45 mt-1">متابعة مباشرة لحالة الدخول والجاهزية.</p>
                  <div className="mt-5 flex gap-3">
                    <div className="flex-1 rounded-2xl border border-brand-500/20 bg-brand-500/10 p-4 text-center"><div className="text-3xl font-black text-white">{players.length}</div><div className="text-sm text-white/50">متصلون</div></div>
                    <div className="flex-1 rounded-2xl border border-emerald-500/20 bg-emerald-500/10 p-4 text-center"><div className="text-3xl font-black text-white">{readyCount}</div><div className="text-sm text-white/50">جاهزون</div></div>
                  </div>
                  <div className="mt-5 space-y-2">
                    {players.length === 0 && <div className="rounded-2xl border border-white/10 bg-white/5 p-4 text-sm text-white/40">لا يوجد لاعبون متصلون بعد.</div>}
                    {players.map(player => (
                      <div key={player.playerId} className="flex items-center gap-3 rounded-2xl border border-white/10 bg-white/5 p-3">
                        <span className="text-2xl">{player.avatar || "🧑‍🎓"}</span>
                        <div className="flex-1">
                          <div className="font-semibold text-white">{player.name}</div>
                          <div className="text-xs text-white/35" dir="ltr">{player.playerId}</div>
                        </div>
                        <div className={`rounded-xl px-3 py-1 text-xs font-bold ${player.ready ? "border border-emerald-500/20 bg-emerald-500/15 text-emerald-300" : "border border-white/10 bg-white/5 text-white/40"}`}>{player.ready ? "جاهز" : "بانتظار"}</div>
                      </div>
                    ))}
                  </div>
                </section>
                {(raceActive || Object.keys(liveProgress || {}).length > 0) && (
                  <section className="glass-strong rounded-3xl p-6" dir="rtl">
                    <h2 className="text-xl font-bold text-white">تقدم السباق المباشر</h2>
                    <p className="text-sm text-white/45 mt-1">متابعة حيّة لتقدم اللاعبين أثناء السباق.</p>
                    <div className="mt-5 space-y-3">
                      {players.map(p => {
                        const stats = (liveProgress || {})[p.playerId] || {};
                        const pct = Math.max(0, Math.min(100, stats.progress || 0));
                        return (
                          <div key={p.playerId} className="rounded-2xl border border-white/10 bg-white/5 p-4">
                            <div className="flex items-center gap-3">
                              <span className="text-2xl">{p.avatar || "🧑‍🎓"}</span>
                              <div className="flex-1"><div className="font-semibold text-white">{p.name}</div></div>
                              {stats.finished && <span className="rounded-xl border border-amber-400/30 bg-amber-400/15 px-3 py-1 text-xs font-bold text-amber-200">أنهى</span>}
                            </div>
                            <div className="mt-3">
                              <div className="flex justify-between text-xs text-white/55 mb-1"><span>التقدم</span><span>{pct}%</span></div>
                              <div className="h-3 rounded-full bg-white/10 overflow-hidden"><div className="h-full rounded-full bg-gradient-to-l from-brand-500 to-emerald-400 transition-all duration-300" style={{width:`${pct}%`}}></div></div>
                            </div>
                            <div className="mt-3 flex gap-2">
                              <span className="rounded-xl border border-brand-500/20 bg-brand-500/10 px-3 py-1 text-xs font-bold text-brand-100">{stats.wpm || 0} WPM</span>
                              <span className="rounded-xl border border-cyan-400/20 bg-cyan-400/10 px-3 py-1 text-xs font-bold text-cyan-100">{stats.accuracy || 0}% دقة</span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </section>
                )}
                {standings.length > 0 && (
                  <section className="glass-strong rounded-3xl p-6">
                    <div className="flex items-center justify-between gap-3 mb-4">
                      <div>
                        <h2 className="text-xl font-bold text-white">النتائج النهائية</h2>
                        <p className="text-sm text-white/45 mt-1">يمكن بدء سباق جديد دون تسجيل خروج المشرف.</p>
                      </div>
                      <button onClick={onNewRace} className="px-4 py-2 rounded-xl bg-gradient-to-l from-brand-500 to-brand-600 text-white font-bold">سباق جديد</button>
                    </div>
                    <div className="space-y-2">
                      {standings.map((entry, index) => (
                        <div key={entry.playerId} className="flex items-center gap-3 rounded-2xl border border-white/10 bg-white/5 p-3">
                          <span className={`w-8 text-center text-lg font-black ${index === 0 ? "text-gold-400" : index === 1 ? "text-slate-300" : index === 2 ? "text-amber-600" : "text-white/30"}`}>{index + 1}</span>
                          <span className="text-2xl">{entry.avatar || "🧑‍🎓"}</span>
                          <div className="flex-1">
                            <div className="font-semibold text-white">{entry.name}</div>
                            <div className="text-xs text-white/35">{entry.school}</div>
                          </div>
                          <div className="text-left">
                            <div className="font-bold text-white">{entry.stats?.score || entry.score || 0}</div>
                            <div className="text-xs text-white/40" dir="ltr">{entry.stats?.wpm || entry.wpm || 0} WPM</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </section>
                )}
                <section className="glass-strong rounded-3xl p-6">
                  <h2 className="text-xl font-bold text-white">بدء السباق</h2>
                  <p className="text-sm text-white/45 mt-1">يبدأ العد التنازلي من 10 إلى 0 عند ضغط زر البدء.</p>
                  {raceText && (
                    <div className="mt-4 rounded-2xl border border-white/10 bg-white/5 p-4 text-right">
                      <p className="text-xs font-bold tracking-widest text-brand-400 mb-2">نص السباق</p>
                      <p className="text-sm leading-7 text-white/80">{raceText}</p>
                    </div>
                  )}
                  <button onClick={onStartRace} disabled={players.length < 2} className="mt-5 w-full py-4 rounded-2xl bg-gradient-to-l from-emerald-500 to-brand-500 text-lg font-black text-white disabled:opacity-40 disabled:cursor-not-allowed">ابدأ السباق</button>
                </section>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    //  ARABIC SENTENCE POOL
    // ═══════════════════════════════════════════════════════

    const ARABIC_SENTENCES = [
      "الوقت كالسيف إن لم تقطعه قطعك",
      "من جد وجد ومن زرع حصد",
      "العلم في الصغر كالنقش على الحجر",
      "اطلب العلم من المهد إلى اللحد",
      "خير الكلام ما قل ودل",
      "الصديق وقت الضيق",
      "الصحة تاج على رؤوس الأصحاء لا يراه إلا المرضى",
      "السماء صافية اليوم والهواء منعش في الصباح الباكر",
      "الشجرة تُعرف من ثمارها والإنسان من أفعاله",
      "الرياضة تقوي الجسم وتصفي الذهن وتبني الشخصية",
      "الحاسوب أداة قوية تساعد الإنسان في جميع مجالات الحياة",
      "التكنولوجيا غيّرت طريقة تواصل الناس مع بعضهم البعض",
      "في كل يوم تشرق الشمس تبدأ فرصة جديدة للنجاح",
      "الأسرة هي الركيزة الأساسية في بناء المجتمع السليم",
      "المطالعة تفتح آفاقاً جديدة وتثري الفكر والخيال",
      "لعب الفريق يحتاج إلى ثقة وتعاون بين جميع الأعضاء",
      "كان التاجر يسير في الصحراء حتى وجد واحة خضراء",
      "النجاح ليس صدفة بل هو نتيجة العمل الدؤوب والإرادة القوية",
      "يجب على كل إنسان أن يحترم بيئته ويحافظ على نظافتها",
      "الماء أصل الحياة والمحافظة عليه واجب على الجميع",
      "مدرستنا جميلة ونتعلم فيها الكثير من العلوم والمعارف",
      "القراءة في الصغر تبني عقلاً ناضجاً في الكبر",
      "كل غيمة لها بطانة فضية وبعد كل عسر يسر",
      "الإنترنت ربط العالم وجعله قرية صغيرة متقاربة",
      "الرياح تجري بما لا تشتهي السفن لكن الصبر مفتاح الفرج"
    ];

    function pickRandomSentence() {
      return ARABIC_SENTENCES[Math.floor(Math.random() * ARABIC_SENTENCES.length)];
    }

    // ═══════════════════════════════════════════════════════
    //  SCREEN 2 — LOBBY (Real-time from server)
    // ═══════════════════════════════════════════════════════

    function LobbyScreen({ player, players, myReady, onReady }) {
      const currentId = player.id || player.playerId;
      const allReady = players.length >= 2 && players.every(p => p.ready);

      return (
        <div className="min-h-screen flex items-center justify-center p-4 screen-enter">
          <div className="w-full max-w-lg">
            <SchoolHeader subtitle="قاعة الانتظار" />
            <div className="glass-strong rounded-3xl p-6 animate-bounce-in">
              <div className="flex items-center justify-between mb-6">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-xl bg-emerald-500/20 flex items-center justify-center text-emerald-400">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-5 h-5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                  </div>
                  <div><h2 className="text-lg font-bold text-white">اللاعبون</h2><p className="text-xs text-white/40">{players.length} مشارك</p></div>
                </div>
                {allReady && <div className="text-sm font-bold text-brand-300 animate-fade-in">بانتظار بدء المشرف</div>}
              </div>
              <div className="space-y-2 mb-6">
                {players.map((p, i) => {
                  const isMe = p.playerId === currentId;
                  return (
                    <div key={p.socketId || p.playerId} className={`flex items-center gap-3 p-3 rounded-xl border transition-all duration-300 ${isMe ? "bg-brand-500/10 border-brand-500/20" : "bg-white/[0.03] border-white/5"}`}>
                      <span className="text-2xl">{p.avatar}</span>
                      <div className="flex-1 min-w-0">
                        <p className="text-sm font-semibold text-white truncate">{p.name}{isMe && <span className="text-brand-400 text-xs mr-2">(أنت)</span>}</p>
                        <p className="text-xs text-white/30">{p.playerId}</p>
                      </div>
                      <div className={`flex items-center gap-1.5 px-3 py-1 rounded-lg text-xs font-bold transition-all duration-300 ${p.ready ? "bg-emerald-500/15 text-emerald-400 border border-emerald-500/20" : "bg-white/5 text-white/30 border border-white/5"}`}>
                        {p.ready && <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5"><polyline points="20 6 9 17 4 12"/></svg>}
                        {p.ready ? "جاهز" : "ينتظر..."}
                      </div>
                    </div>
                  );
                })}
              </div>
              {!myReady && players.length >= 2 && (
                <button onClick={onReady} className="w-full py-3.5 rounded-xl bg-gradient-to-l from-emerald-500 to-emerald-600 hover:from-emerald-400 hover:to-emerald-500 text-white font-bold transition-all duration-200 shadow-lg shadow-emerald-500/20 active:scale-[0.98] flex items-center justify-center gap-2 animate-slide-up">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-5 h-5"><polyline points="20 6 9 17 4 12"/></svg> أنا جاهز!
                </button>
              )}
              {myReady && !allReady && <div className="text-center text-emerald-400 text-sm font-medium animate-pulse">⏳ في انتظار باقي اللاعبين...</div>}
              {myReady && allReady && <div className="text-center text-brand-300 text-sm font-medium animate-pulse">⏳ الجميع جاهز، بانتظار المشرف لبدء العد التنازلي...</div>}
              {players.length < 2 && <div className="text-center text-white/30 text-sm">⏳ في انتظار لاعبين آخرين...</div>}
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    //  SCREEN 3 — COUNTDOWN (Server-driven)
    // ═══════════════════════════════════════════════════════

    function CountdownScreen({ value }) {
      return (
        <div className="min-h-screen flex items-center justify-center bg-[#0a0e1a]">
          <div className="text-center">
            <div className="relative w-64 h-64 mx-auto flex items-center justify-center">
              <div className="absolute inset-0 rounded-full border-2 border-brand-500/10 animate-ping" style={{animationDuration:"2s"}}></div>
              <div className="absolute inset-4 rounded-full border border-brand-500/5"></div>
              <div className="absolute inset-8 rounded-full border border-brand-500/5"></div>
              {value && (value === "3" || value === "2" || value === "1") && (
                <div key={value} className="count-number animate-count-pop">{value}</div>
              )}
              {value && value !== "3" && value !== "2" && value !== "1" && (
                <div key="go" className="animate-count-pop">
                  <div className="text-5xl md:text-6xl font-black bg-gradient-to-r from-emerald-400 to-brand-400 bg-clip-text text-transparent animate-bounce-in">{value}</div>
                </div>
              )}
              {!value && <p className="text-white/20 animate-pulse">جاري التحضير...</p>}
            </div>
            <p className="text-white/20 text-sm mt-4 animate-pulse">استعد...</p>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    //  SCREEN 4 — RACE (Real-time typing + leaderboard)
    // ═══════════════════════════════════════════════════════

    function RaceScreen({ player, text, typed, onChange, wpm, accuracy, progress, score, elapsed, maxDuration, liveProgress, roomPlayers }) {
      const inputRef = useRef(null);
      const currentId = player.id || player.playerId;
      useEffect(() => { inputRef.current?.focus(); }, []);
      useEffect(() => {
        const el = inputRef.current;
        if (!el) return;
        const blockPaste = e => e.preventDefault();
        const blockContext = e => e.preventDefault();
        const blockPasteKey = e => {
          if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'v') e.preventDefault();
        };
        el.addEventListener('paste', blockPaste);
        el.addEventListener('contextmenu', blockContext);
        el.addEventListener('keydown', blockPasteKey);
        return () => {
          el.removeEventListener('paste', blockPaste);
          el.removeEventListener('contextmenu', blockContext);
          el.removeEventListener('keydown', blockPasteKey);
        };
      }, []);

      const remaining = Math.max(0, maxDuration - elapsed);
      const isFinished = typed.length >= text.length;

      const charMap = useMemo(() => {
        const chars = [];
        for (let i = 0; i < text.length; i++) {
          if (i < typed.length) chars.push({ char: text[i], status: typed[i] === text[i] ? "correct" : "wrong" });
          else if (i === typed.length) chars.push({ char: text[i], status: "current" });
          else chars.push({ char: text[i], status: "pending" });
        }
        return chars;
      }, [text, typed]);

      const leaderboard = useMemo(() => {
        const entries = roomPlayers.map(p => {
          if (p.playerId === currentId) return { ...p, progress, wpm, isMe: true };
          const lp = liveProgress[p.playerId] || {};
          return { ...p, progress: lp.progress || 0, wpm: lp.wpm || 0, isMe: false };
        });
        return entries.sort((a, b) => b.progress - a.progress);
      }, [roomPlayers, liveProgress, currentId, progress, wpm]);

      return (
        <div className="min-h-screen flex flex-col p-3 md:p-6 screen-enter">
          <div className="flex items-center justify-between mb-4">
            <div className="flex items-center gap-2 glass rounded-xl px-4 py-2">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              <span className={`text-lg font-bold font-mono tabular-nums ${remaining < 15 ? "text-rose-400 animate-pulse" : "text-white"}`}>{formatTime(remaining)}</span>
            </div>
            <div className="flex items-center gap-2"><span className="text-lg">{player.avatar}</span><span className="text-sm font-semibold text-white/80">{player.name}</span></div>
          </div>
          <div className="grid grid-cols-4 gap-2 mb-4">
            <StatCard icon={<svg viewBox="0 0 24 24" fill="currentColor" className="w-4 h-4"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>} label="كلمة/دقيقة" value={wpm} color="brand" />
            <StatCard icon={<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>} label="الدقة" value={`${accuracy}%`} color="emerald" />
            <StatCard icon={<svg viewBox="0 0 24 24" fill="currentColor" className="w-4 h-4"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>} label="النتيجة" value={score} color="gold" />
            <StatCard icon={<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="M7 16h10"/></svg>} label="التقدم" value={`${progress}%`} color="rose" />
          </div>
          <div className="flex-1 flex gap-4">
            <div className="flex-1 flex flex-col">
              <div className="glass-strong rounded-2xl p-5 md:p-6 mb-3 flex-1 min-h-[180px] max-h-[280px] overflow-y-auto">
                <div className="text-xl md:text-2xl leading-[2.2] font-medium tracking-wide text-right selection:bg-brand-500/30">
                  {charMap.map((c, i) => <span key={i} className={`transition-colors duration-100 ${c.status === "correct" ? "char-correct" : ""} ${c.status === "wrong" ? "char-wrong" : ""} ${c.status === "current" ? "char-current" : ""} ${c.status === "pending" ? "char-pending" : ""}`}>{c.char}</span>)}
                </div>
              </div>
              <div className="glass-strong rounded-2xl p-1 mb-3 animate-glow" style={{ animationPlayState: isFinished ? "paused" : "running" }}>
                <input ref={inputRef} type="text" value={typed} onChange={e => onChange(e.target.value)} disabled={isFinished} placeholder="ابدأ الكتابة هنا..." className="race-input w-full bg-transparent rounded-xl py-4 px-5 text-lg text-white placeholder:text-white/20 disabled:opacity-50" dir="rtl" autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false" />
              </div>
              <ProgressBar value={typed.length} max={text.length} label={`${typed.length} / ${text.length} حرف`} />
            </div>
            <div className="hidden md:block w-56 glass-strong rounded-2xl p-4">
              <div className="flex items-center gap-2 mb-4">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4 text-gold-400"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                <span className="text-sm font-bold text-white/70">الترتيب المباشر</span>
              </div>
              <div className="space-y-2">
                {leaderboard.map((p, i) => (
                  <div key={p.playerId} className={`flex items-center gap-2 p-2 rounded-lg transition-all duration-300 ${p.isMe ? "bg-brand-500/15" : "bg-white/[0.03]"}`}>
                    <span className={`text-xs font-bold w-5 text-center ${i === 0 ? "text-gold-400" : i === 1 ? "text-slate-300" : i === 2 ? "text-amber-600" : "text-white/30"}`}>{i + 1}</span>
                    <span className="text-base">{p.avatar}</span>
                    <div className="flex-1 min-w-0">
                      <p className="text-xs font-medium text-white/80 truncate">{p.name?.split(" ")[0]}</p>
                      <div className="h-1.5 bg-white/5 rounded-full mt-1 overflow-hidden"><div className={`h-full rounded-full transition-all duration-500 ${p.isMe ? "bg-brand-400" : "bg-white/20"}`} style={{ width: `${p.progress}%` }}></div></div>
                    </div>
                    <span className="text-[10px] text-white/30 font-mono">{Math.round(p.progress)}%</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
          {isFinished && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 animate-fade-in">
              <div className="text-center animate-bounce-in"><div className="text-6xl mb-4">🏁</div><h2 className="text-3xl font-bold text-white mb-2">أحسنت!</h2><p className="text-white/50">في انتظار باقي اللاعبين...</p></div>
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    //  SCREEN 5 — RESULTS (Server standings)
    // ═══════════════════════════════════════════════════════

    function ResultsScreen({ player, results, standings, onRestart, onEndSession, onBackToHome }) {
      const currentId = player.id || player.playerId;
      const myRank = standings.findIndex(s => s.playerId === currentId) + 1;
      const MEDALS = ["🥇", "🥈", "🥉"];

      return (
        <div className="min-h-screen flex items-center justify-center p-4 screen-enter">
          <div className="w-full max-w-lg">
            <SchoolHeader subtitle="النتائج النهائية" />
            <div className="glass-strong rounded-3xl p-6 mb-4 animate-bounce-in">
              <div className="text-center mb-6">
                <div className="text-5xl mb-2">{myRank > 0 && myRank <= 3 ? MEDALS[myRank - 1] : "🎯"}</div>
                <h2 className="text-2xl font-bold text-white">{player.name}</h2>
                <p className="text-sm text-white/40 mt-1">{myRank === 1 ? "🎉 مبروك! المركز الأول" : myRank > 0 ? `المركز ${myRank} من ${standings.length}` : "أحسنت!"}</p>
              </div>
              <div className="grid grid-cols-2 gap-3 mb-6">
                <StatCard icon={<svg viewBox="0 0 24 24" fill="currentColor" className="w-4 h-4"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>} label="كلمة في الدقيقة" value={results.wpm} color="brand" />
                <StatCard icon={<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>} label="الدقة" value={`${results.accuracy}%`} color="emerald" />
                <StatCard icon={<svg viewBox="0 0 24 24" fill="currentColor" className="w-4 h-4"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>} label="النتيجة" value={results.score} color="gold" />
                <StatCard icon={<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>} label="الوقت" value={`${Math.round(results.time)}ث`} color="rose" />
              </div>
              <div className="bg-white/5 rounded-xl p-4">
                <div className="flex justify-between text-xs text-white/40 mb-2"><span>الأداء</span><span>{results.wpm} كلمة/دقيقة</span></div>
                <div className="h-4 bg-white/5 rounded-full overflow-hidden"><div className="h-full bg-gradient-to-l from-emerald-400 to-brand-400 rounded-full transition-all duration-1000 progress-glow" style={{ width: `${Math.min((results.wpm / 60) * 100, 100)}%` }}></div></div>
                <div className="flex justify-between text-[10px] text-white/20 mt-1"><span>0</span><span>30</span><span>60+</span></div>
              </div>
            </div>
            <div className="glass-strong rounded-2xl p-4 mb-4 animate-slide-up" style={{animationDelay:"200ms"}}>
              <div className="flex items-center gap-2 mb-4">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-5 h-5 text-gold-400"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                <span className="text-sm font-bold text-white/70">الترتيب النهائي</span>
              </div>
              <div className="space-y-2">
                {standings.map((s, i) => {
                  const isMe = s.playerId === currentId;
                  return (
                    <div key={s.playerId} className={`flex items-center gap-3 p-3 rounded-xl transition-all duration-300 ${isMe ? "bg-brand-500/15 border border-brand-500/20" : "bg-white/[0.03]"} ${i < 3 ? "animate-slide-up" : ""}`} style={{ animationDelay: `${300 + i * 100}ms` }}>
                      <span className={`text-xl font-black w-8 text-center ${i === 0 ? "text-gold-400 medal-gold" : i === 1 ? "text-slate-300 medal-silver" : i === 2 ? "text-amber-600 medal-bronze" : "text-white/30"}`}>{i < 3 ? MEDALS[i] : i + 1}</span>
                      <span className="text-xl">{s.avatar}</span>
                      <div className="flex-1 min-w-0"><p className="text-sm font-semibold text-white truncate">{s.name}{isMe && <span className="text-brand-400 text-xs mr-1">(أنت)</span>}</p><p className="text-xs text-white/30">{s.school}</p></div>
                      <div className="text-left"><p className="text-sm font-bold text-white">{s.stats?.score || s.score || 0}</p><p className="text-[10px] text-white/30" dir="ltr">{s.stats?.wpm || s.wpm || 0} WPM · {s.stats?.accuracy || s.accuracy || 0}%</p></div>
                    </div>
                  );
                })}
              </div>
            </div>
            <div className="animate-slide-up" style={{animationDelay:"800ms"}}>
              <button onClick={onRestart} className="w-full py-3.5 rounded-xl bg-gradient-to-l from-brand-500 to-brand-600 hover:from-brand-400 hover:to-brand-500 text-white font-bold transition-all duration-200 shadow-lg shadow-brand-500/20 active:scale-[0.98]">سباق جديد</button>
            </div>
            <div className="mt-3 grid gap-3 md:grid-cols-2 animate-slide-up" style={{animationDelay:"900ms"}}>
              <button onClick={onEndSession} className="w-full py-3.5 rounded-xl border border-rose-500/25 bg-rose-500/10 text-rose-200 font-bold transition-all duration-200 hover:bg-rose-500/15">إنهاء الجلسة</button>
              <button onClick={onBackToHome} className="w-full py-3.5 rounded-xl bg-white/8 border border-white/10 text-white/85 font-bold transition-all duration-200 hover:bg-white/10">العودة للرئيسية</button>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    //  APP — Full-stack orchestrator with Socket.io
    // ═══════════════════════════════════════════════════════

    function App() {
      const _s = loadSession();
      const [screen, setScreen] = useState(() => {
        if (!_s?.mode) return SCREEN.LANDING;
        if (_s.mode === "player" && [SCREEN.COUNTDOWN, SCREEN.RACE, SCREEN.RESULTS].includes(_s.screen)) return SCREEN.LOBBY;
        return _s.screen || SCREEN.LANDING;
      });
      const [mode, setMode] = useState(_s?.mode || null);
      const modeRef = useRef(_s?.mode || null);
      const [player, setPlayer] = useState(_s?.player || null);
      const [adminToken, setAdminToken] = useState(_s?.adminToken || "");
      const [raceActive, setRaceActive] = useState(false);
      const [socket, setSocket] = useState(null);
      const [connected, setConnected] = useState(false);
      const [roomId, setRoomId] = useState(null);
      const [roomPlayers, setPlayers] = useState([]);
      const [myReady, setMyReady] = useState(false);
      const [raceText, setRaceText] = useState("");
      const [maxDuration, setMaxDur] = useState(120);
      const [countVal, setCountVal] = useState(null);
      const [startedAt, setStartedAt] = useState(null);
      const [liveProgress, setLive] = useState({});
      const [standings, setStandings] = useState([]);

      const typedRef = useRef("");
      const correctRef = useRef(0);
      const totalKeysRef = useRef(0);
      const startTimeRef = useRef(null);
      const [typed, setTyped] = useState("");

      const elapsed = startTimeRef.current ? (Date.now() - startTimeRef.current) / 1000 : 0;
      const wpm = elapsed > 0 ? Math.round((correctRef.current / 5 / elapsed) * 60) : 0;
      const accuracy = totalKeysRef.current > 0 ? Math.round((correctRef.current / totalKeysRef.current) * 100) : 100;
      const progress = raceText ? Math.min(Math.round((typed.length / raceText.length) * 100), 100) : 0;
      const score = Math.round(wpm * (accuracy / 100) * 10);

      const buildJoinPayload = useCallback((p, extra = {}) => ({
        playerId: p.id || p.playerId,
        playerName: p.name,
        school: p.school,
        avatar: p.avatar,
        ...(p.isGuest ? { isGuest: true } : {}),
        ...extra,
      }), []);

      const applyRaceStart = useCallback((data = {}) => {
        setRaceText(data.text || "");
        setMaxDur(data.maxDuration);
        setStartedAt(data.startedAt);
        setPlayers(data.players || []);
        typedRef.current = "";
        correctRef.current = 0;
        totalKeysRef.current = 0;
        startTimeRef.current = null;
        setTyped("");
        setLive({});
        setCountVal(null);
        setRaceActive(true);
        if (modeRef.current === "player") setScreen(SCREEN.RACE);
      }, []);

      const connectSocket = useCallback(() => {
        if (socket) return socket;

        const s = io(SOCKET_URL, { transports: ["websocket"], reconnection: true });
        s.on("connect", () => setConnected(true));
        s.on("disconnect", () => setConnected(false));
        s.on("room_joined", data => {
          setRoomId(data.roomId);
          setPlayers(data.players || []);
        });
        s.on("player_ready", data => {
          setPlayers(data.players || []);
        });
        s.on("admin_player_joined", data => {
          setPlayers(data.players || []);
        });
        s.on("admin_player_ready", data => {
          setPlayers(data.players || []);
        });
        s.on("countdown_tick", data => {
          setCountVal(String(data.value));
          if (modeRef.current === "player") setScreen(SCREEN.COUNTDOWN);
        });
        s.on("room_update", data => {
          setPlayers(data.players || []);
          if (data.status === "racing") setRaceActive(true);
          if (data.status === "finished" || data.status === "waiting") setRaceActive(false);
        });
        s.on("race_start", applyRaceStart);
        s.on("player_progress", data => {
          setLive(prev => ({ ...prev, [data.playerId]: { progress: data.progress, wpm: data.wpm, accuracy: data.accuracy, score: data.score, finished: data.finished } }));
        });
        s.on("player_finish", data => {
          setLive(prev => ({ ...prev, [data.playerId]: { ...(prev[data.playerId] || {}), finished: true, ...(data.stats || {}) } }));
        });
        s.on("race_end", data => {
          setStandings(data.standings || []);
          setRaceActive(false);
          if (modeRef.current === "player") setScreen(SCREEN.RESULTS);
        });
        s.on("player_left", data => setPlayers(data.players || []));
        s.on("error", data => console.error("Socket error:", data.message));
        setSocket(s);
        return s;
      }, [applyRaceStart, socket]);

      const resetApp = useCallback(() => {
        clearSession();
        socket?.disconnect();
        setSocket(null);
        setConnected(false);
        setScreen(SCREEN.LANDING);
        setMode(null);
        modeRef.current = null;
        setRaceActive(false);
        setPlayer(null);
        setAdminToken("");
        setRoomId(null);
        setPlayers([]);
        setMyReady(false);
        setRaceText("");
        setMaxDur(120);
        setCountVal(null);
        setStartedAt(null);
        setLive({});
        setStandings([]);
        typedRef.current = "";
        correctRef.current = 0;
        totalKeysRef.current = 0;
        startTimeRef.current = null;
        setTyped("");
      }, [socket]);

      const handlePlayerLogin = useCallback((p) => {
        const s = connectSocket();
        setMode("player");
        modeRef.current = "player";
        setPlayer(p);
        setScreen(SCREEN.LOBBY);
        saveSession({ mode: "player", screen: SCREEN.LOBBY, player: p, adminToken: "" });

        const joinRoom = () => {
          s.emit("join_room", buildJoinPayload(p), (ack) => {
            if (!ack?.error) {
              setRoomId(ack.roomId);
              setPlayers(ack.players || []);
            }
          });
        };

        if (s.connected) joinRoom();
        else s.once("connect", joinRoom);
      }, [buildJoinPayload, connectSocket]);

      const handleAdminLogin = useCallback((token) => {
        const s = connectSocket();
        setMode("admin");
        modeRef.current = "admin";
        setAdminToken(token);
        setScreen(SCREEN.ADMIN_PANEL);
        saveSession({ mode: "admin", screen: SCREEN.ADMIN_PANEL, adminToken: token, player: null });

        const joinAdmin = () => {
          s.emit("admin_connect", { token }, (ack) => {
            if (!ack?.error) {
              setRoomId(ack.roomId);
              setPlayers(ack.players || []);
            }
          });
        };

        if (s.connected) joinAdmin();
        else s.once("connect", joinAdmin);
      }, [connectSocket]);

      // Auto-reconnect socket on page refresh
      useEffect(() => {
        const saved = loadSession();
        if (!saved?.mode) return;
        const s = connectSocket();
        if (saved.mode === "admin" && saved.adminToken) {
          const rejoin = () => s.emit("admin_connect", { token: saved.adminToken }, (ack) => {
            if (!ack?.error) { setRoomId(ack.roomId); setPlayers(ack.players || []); }
          });
          if (s.connected) rejoin(); else s.once("connect", rejoin);
        } else if (saved.mode === "player" && saved.player) {
          const p = saved.player;
          const rejoin = () => s.emit("join_room", buildJoinPayload(p), (ack) => {
            if (!ack?.error) { setRoomId(ack.roomId); setPlayers(ack.players || []); }
          });
          if (s.connected) rejoin(); else s.once("connect", rejoin);
        }
      }, [buildJoinPayload, connectSocket]);

      const handleSavePlayers = useCallback(async (rows) => {
        const existing = await getPlayers();

        for (const row of rows) {
          if (!row.name.trim() || !row.pin.trim()) {
            throw new Error("أكمل الاسم والرمز السري لكل لاعب قبل الحفظ");
          }

          const payload = {
            id: row.id.trim().toUpperCase(),
            name: row.name.trim(),
            pin: row.pin.trim(),
            school: row.school || "شمس المعارف",
            avatar: row.avatar || "🧑‍🎓"
          };

          const exists = existing.find(player => player.id === payload.id);
          if (exists) await updatePlayer(payload.id, payload, adminToken);
          else await createPlayer(payload, adminToken);
        }
      }, [adminToken]);

      const handleReady = useCallback(() => {
        if (!socket) return;
        setMyReady(true);
        socket.emit("player_ready", {}, () => {});
      }, [socket]);

      const handleAdminStart = useCallback(() => {
        const text = pickRandomSentence();
        setRaceText(text);
        socket?.emit("admin_start_race", { adminToken, text }, (ack) => {
          if (ack?.error) console.error("Admin start error:", ack.message);
        });
      }, [socket, adminToken]);

      const handleTyping = useCallback((newTyped) => {
        if (!raceText) return;
        const prevLen = typedRef.current.length;
        if (!startTimeRef.current && newTyped.length > 0) startTimeRef.current = Date.now();
        if (newTyped.length > prevLen) {
          totalKeysRef.current++;
          if (newTyped[newTyped.length - 1] === raceText[newTyped.length - 1]) correctRef.current++;
        }
        typedRef.current = newTyped;
        setTyped(newTyped);

        const elapsed = startTimeRef.current ? (Date.now() - startTimeRef.current) / 1000 : 0;
        socket?.emit("player_progress", { typed: newTyped.length, correctChars: correctRef.current, totalKeystrokes: totalKeysRef.current, elapsed });

        if (newTyped.length >= raceText.length) {
          const typedWpm = elapsed > 0 ? Math.round((correctRef.current / 5 / elapsed) * 60) : 0;
          const acc = totalKeysRef.current > 0 ? Math.round((correctRef.current / totalKeysRef.current) * 100) : 100;
          const sc = Math.round(typedWpm * (acc / 100) * 10);
          socket?.emit("player_finish", { wpm: typedWpm, accuracy: acc, score: sc, time: elapsed, correctChars: correctRef.current, totalKeystrokes: totalKeysRef.current });
        }
      }, [raceText, socket]);

      const handleRestart = useCallback(() => {
        clearSession();
        setRaceText("");
        setStandings([]);
        setLive({});
        setCountVal(null);
        setMyReady(false);
        typedRef.current = "";
        correctRef.current = 0;
        totalKeysRef.current = 0;
        startTimeRef.current = null;
        setTyped("");
        if (socket && player) {
          socket.emit("join_room", buildJoinPayload(player, { roomId }), (ack) => {
            if (!ack?.error) {
              setPlayers(ack.players || []);
              setScreen(SCREEN.LOBBY);
            }
          });
        }
      }, [buildJoinPayload, socket, player, roomId]);

      const handleAdminNewRace = useCallback(() => {
        const token = adminToken;
        clearSession();
        socket?.disconnect();
        setSocket(null);
        setConnected(false);
        setRaceActive(false);
        setRoomId(null);
        setPlayers([]);
        setMyReady(false);
        setRaceText("");
        setMaxDur(120);
        setCountVal(null);
        setStartedAt(null);
        setLive({});
        setStandings([]);
        typedRef.current = "";
        correctRef.current = 0;
        totalKeysRef.current = 0;
        startTimeRef.current = null;
        setTyped("");
        setScreen(SCREEN.ADMIN_PANEL);
        setMode("admin");
        modeRef.current = "admin";
        setAdminToken(token);

        const nextSocket = io(SOCKET_URL, { transports: ["websocket"], reconnection: true });
        nextSocket.on("connect", () => setConnected(true));
        nextSocket.on("disconnect", () => setConnected(false));
        nextSocket.on("room_joined", data => {
          setRoomId(data.roomId);
          setPlayers(data.players || []);
        });
        nextSocket.on("player_ready", data => {
          setPlayers(data.players || []);
        });
        nextSocket.on("admin_player_joined", data => {
          setPlayers(data.players || []);
        });
        nextSocket.on("admin_player_ready", data => {
          setPlayers(data.players || []);
        });
        nextSocket.on("countdown_tick", data => {
          setCountVal(data.value);
          if (modeRef.current === "player") setScreen(SCREEN.COUNTDOWN);
        });
        nextSocket.on("room_update", data => {
          setPlayers(data.players || []);
          if (data.status === "racing") setRaceActive(true);
          if (data.status === "finished" || data.status === "waiting") setRaceActive(false);
        });
        nextSocket.on("race_start", applyRaceStart);
        nextSocket.on("player_progress", data => {
          setLive(prev => ({ ...prev, [data.playerId]: { progress: data.progress, wpm: data.wpm, accuracy: data.accuracy, score: data.score, finished: data.finished } }));
        });
        nextSocket.on("player_finish", data => {
          setLive(prev => ({ ...prev, [data.playerId]: { ...(prev[data.playerId] || {}), finished: true, ...(data.stats || {}) } }));
        });
        nextSocket.on("race_end", data => {
          setStandings(data.standings || []);
          setRaceActive(false);
          if (modeRef.current === "player") setScreen(SCREEN.RESULTS);
        });
        nextSocket.on("player_left", data => setPlayers(data.players || []));
        nextSocket.on("error", data => console.error("Socket error:", data.message));
        setSocket(nextSocket);
        saveSession({ mode: "admin", screen: SCREEN.ADMIN_PANEL, adminToken: token, player: null });

        const joinAdmin = () => {
          nextSocket.emit("admin_connect", { token }, (ack) => {
            if (!ack?.error) {
              setRoomId(ack.roomId);
              setPlayers(ack.players || []);
            }
          });
        };

        if (nextSocket.connected) joinAdmin();
        else nextSocket.once("connect", joinAdmin);
      }, [adminToken, applyRaceStart, socket]);

      return (
        <div className="font-cairo relative min-h-screen">
          <BGDecor />
          <div className="relative z-10">
            {screen === SCREEN.LANDING && <DashboardScreen onSelectMode={(nextMode) => { setMode(nextMode); setScreen(nextMode === "admin" ? SCREEN.ADMIN_LOGIN : SCREEN.PLAYER_LOGIN); }} />}
            {screen === SCREEN.ADMIN_LOGIN && <AdminLoginScreen onSuccess={handleAdminLogin} onBack={resetApp} />}
            {screen === SCREEN.PLAYER_LOGIN && <PlayerLoginScreen onLogin={handlePlayerLogin} onBack={resetApp} />}
            {screen === SCREEN.ADMIN_PANEL && <AdminPanelScreen adminToken={adminToken} players={roomPlayers} liveProgress={liveProgress} raceActive={raceActive} standings={standings} raceText={raceText} onSavePlayers={handleSavePlayers} onStartRace={handleAdminStart} onNewRace={handleAdminNewRace} onBack={resetApp} />}
            {screen === SCREEN.LOBBY && <LobbyScreen player={player} players={roomPlayers} myReady={myReady} onReady={handleReady} />}
            {screen === SCREEN.COUNTDOWN && <CountdownScreen value={countVal} />}
            {screen === SCREEN.RACE && <RaceScreen player={player} text={raceText} typed={typed} onChange={handleTyping} wpm={wpm} accuracy={accuracy} progress={progress} score={score} elapsed={elapsed} maxDuration={maxDuration} liveProgress={liveProgress} roomPlayers={roomPlayers} />}
            {screen === SCREEN.RESULTS && <ResultsScreen player={player} results={{ wpm, accuracy, score, time: elapsed, correctChars: correctRef.current, totalKeys: totalKeysRef.current }} standings={standings} onRestart={handleRestart} onEndSession={resetApp} onBackToHome={resetApp} />}
            {!connected && ![SCREEN.LANDING, SCREEN.ADMIN_LOGIN, SCREEN.PLAYER_LOGIN].includes(screen) && (
              <div className="fixed top-4 left-4 z-50 bg-rose-500/20 border border-rose-500/30 rounded-xl px-4 py-2 text-sm text-rose-400 animate-pulse">⚠️ جاري إعادة الاتصال...</div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
